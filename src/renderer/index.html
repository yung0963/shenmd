<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shenMD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- 拖放提示 -->
    <div id="drag-overlay" class="drag-overlay">
        <div class="drag-overlay-text">拖放 Markdown 檔案至此開啟</div>
    </div>

    <!-- 頂部標題列 -->
    <header id="app-header" class="bg-white border-b border-gray-200 pr-4 pl-2 py-2 flex items-center gap-3 flex-shrink-0 shadow-sm">
        <!-- macOS 視窗控制按鈕預留區 -->
        <div class="w-[70px] flex-shrink-0"></div>
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-[#42b883]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>
            <span class="font-semibold text-gray-800 text-sm">shenMD</span>
        </div>

        <!-- 檢視模式 -->
        <div class="flex items-center gap-1 ml-2">
            <button id="viewEdit"    class="view-btn" title="僅編輯">編輯</button>
            <button id="viewSplit"   class="view-btn active" title="分割檢視">分割</button>
            <button id="viewPreview" class="view-btn" title="僅預覽">預覽</button>
        </div>

        <div class="flex-1"></div>

        <!-- 字型大小 -->
        <div class="flex items-center gap-1">
            <button id="fontDecBtn" class="w-7 h-7 flex items-center justify-center rounded border border-gray-200 hover:border-[#42b883] hover:text-[#42b883] text-gray-600 font-bold text-xs bg-white transition-colors" title="縮小字型">A-</button>
            <span id="fontSizeLabel" class="text-xs text-gray-500 w-10 text-center">15px</span>
            <button id="fontIncBtn" class="w-7 h-7 flex items-center justify-center rounded border border-gray-200 hover:border-[#42b883] hover:text-[#42b883] text-gray-600 font-bold text-xs bg-white transition-colors" title="放大字型">A+</button>
        </div>

        <div id="csvEncodingWrap" class="hidden items-center gap-2 text-xs text-gray-600">
            <span>CSV 編碼</span>
            <select id="csvEncodingSelect" class="border border-gray-300 rounded px-2 py-1 bg-white text-xs outline-none focus:border-[#42b883]">
                <option value="auto">自動</option>
                <option value="big5">Big5</option>
                <option value="utf-8">UTF-8</option>
                <option value="utf-16le">UTF-16 LE</option>
                <option value="utf-16be">UTF-16 BE</option>
                <option value="gb18030">GB18030</option>
            </select>
        </div>

        <!-- 切換側邊欄 -->
        <button id="toggleSidebarBtn" class="flex items-center gap-1.5 text-gray-500 hover:text-[#42b883] transition-colors text-xs border border-gray-200 hover:border-[#42b883] rounded px-2 py-1.5 bg-white" title="切換側邊欄">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>

        <!-- 儲存按鈕 -->
        <button id="saveBtn" disabled class="flex items-center gap-1.5 text-gray-400 border border-gray-300 bg-gray-50 cursor-not-allowed rounded px-3 py-1.5 text-xs font-medium transition-colors" title="儲存檔案 (Ctrl+S)">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
            儲存
        </button>

        <!-- Word 匯出 -->
        <button id="exportWordBtn" class="bg-blue-600 hover:bg-blue-700 transition-colors text-white px-4 py-1.5 rounded-md shadow-sm font-medium text-sm flex items-center gap-2" title="匯出 Word (.docx)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            匯出 Word
        </button>

        <button id="exportExcelBtn" class="hidden bg-emerald-600 hover:bg-emerald-700 transition-colors text-white px-4 py-1.5 rounded-md shadow-sm font-medium text-sm flex items-center gap-2" title="將 CSV 匯出為 Excel (.xlsx)">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            CSV 轉 Excel
        </button>

        <!-- PDF 匯出 -->
        <button id="openPdfPanelBtn" class="bg-[#42b883] hover:bg-[#33a06f] transition-colors text-white px-4 py-1.5 rounded-md shadow-sm font-medium text-sm flex items-center gap-2" title="PDF 匯出設定">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            匯出 PDF
        </button>
    </header>

    <!-- 主內容區 -->
    <main class="flex flex-1 overflow-hidden">

        <!-- 側邊欄：資料夾瀏覽 -->
        <aside id="sidebar" class="bg-white border-r border-gray-200 flex flex-col overflow-hidden">
            <div class="flex items-center justify-between px-3 py-2 border-b border-gray-100 flex-shrink-0">
                <span class="text-xs font-semibold text-gray-500 uppercase tracking-wide">檔案瀏覽</span>
                <div class="flex items-center gap-1">
                    <button id="refreshDirBtn" title="刷新檔案列表" class="flex items-center gap-1 text-xs text-gray-500 hover:text-[#42b883] transition-colors px-1.5 py-1 rounded hover:bg-gray-100">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        刷新
                    </button>
                    <button id="openDirBtn" title="開啟資料夾" class="flex items-center gap-1 text-xs text-gray-500 hover:text-[#42b883] transition-colors px-1.5 py-1 rounded hover:bg-gray-100">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
                        開啟
                    </button>
                </div>
            </div>
            <div id="dir-name" class="hidden px-3 py-1.5 text-xs font-medium text-[#42b883] border-b border-gray-100 truncate flex-shrink-0"></div>
            <!-- 首次使用提示 -->
            <div id="file-prompt" class="">
                <button id="file-prompt-btn">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
                    開啟資料夾
                </button>
                <p>點擊上方按鈕選取資料夾<br>之後會自動記住</p>
            </div>
            <div id="file-list" class="flex-1 overflow-y-auto py-1"></div>
        </aside>

        <!-- 編輯器面板 -->
        <div id="editor-panel" class="flex flex-col overflow-hidden" style="width:50%">
            <!-- Markdown 工具列 -->
            <div id="md-toolbar">
                <button class="tb-btn" data-action="h1" title="標題 1">H1</button>
                <button class="tb-btn" data-action="h2" title="標題 2">H2</button>
                <button class="tb-btn" data-action="h3" title="標題 3">H3</button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-action="bold" title="粗體 (Ctrl+B)"><b>B</b></button>
                <button class="tb-btn" data-action="italic" title="斜體 (Ctrl+I)"><i>I</i></button>
                <button class="tb-btn" data-action="strike" title="刪除線" style="text-decoration:line-through">S</button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-action="ul" title="無序清單">•</button>
                <button class="tb-btn" data-action="ol" title="有序清單">1.</button>
                <button class="tb-btn" data-action="quote" title="引言">"</button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-action="link" title="連結 (Ctrl+K)">🔗</button>
                <button class="tb-btn" data-action="image" title="圖片">🖼</button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-action="inlinecode" title="行內程式碼">`c`</button>
                <button class="tb-btn" data-action="codeblock" title="程式碼區塊" style="font-size:0.65rem">```</button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-action="table" title="表格" style="font-size:0.7rem">表</button>
                <button class="tb-btn" data-action="hr" title="水平線">—</button>
            </div>
            <!-- 編輯器標題列 -->
            <div class="flex items-center justify-between px-3 py-1 bg-gray-50 border-b border-gray-200 flex-shrink-0">
                <span class="text-xs font-medium text-gray-400">Markdown</span>
                <span id="edit-stats" class="text-xs text-gray-400"></span>
            </div>
            <textarea id="editor" class="flex-1 w-full p-4 font-mono text-sm text-gray-800 bg-white outline-none resize-none leading-relaxed" placeholder="在此輸入 Markdown..."></textarea>
        </div>

        <!-- 拖曳分隔線 -->
        <div id="resize-handle" title="拖曳調整寬度"></div>

        <!-- 預覽面板 -->
        <div id="preview-panel" class="flex flex-col overflow-hidden border-l border-gray-200" style="width:50%">
            <div class="flex items-center justify-between px-3 py-1 bg-gray-50 border-b border-gray-200 flex-shrink-0">
                <span class="text-xs font-medium text-gray-400">預覽</span>
            </div>
            <div id="preview-wrapper" class="flex-1 overflow-y-auto">
                <div id="preview-content" class="vue-markdown max-w-none p-6"></div>
            </div>
        </div>
    </main>

    <!-- 狀態列 -->
    <div id="statusbar">
        <span id="status">就緒</span>
        <div class="stat-sep"></div>
        <span id="stat-words">0 字</span>
        <span id="stat-lines">1 行</span>
        <span id="stat-chars">0 字元</span>
        <div class="stat-sep"></div>
        <span id="stat-file" class="italic text-gray-400">未開啟檔案</span>
    </div>

    <!-- PDF 設定面板 -->
    <div id="pdf-panel">
        <div id="pdf-overlay"></div>
        <div id="pdf-dialog">
            <div class="flex items-center justify-between">
                <h2 class="text-base font-semibold text-gray-800">PDF 匯出設定</h2>
                <button id="closePdfPanel" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <div class="pdf-field">
                <label>檔案名稱</label>
                <input type="text" id="pdf-filename" placeholder="Document" value="Document">
            </div>

            <div class="pdf-field">
                <label>方向</label>
                <div class="pdf-radio-group">
                    <label><input type="radio" name="pdf-orient" value="portrait" checked><span>縱向</span></label>
                    <label><input type="radio" name="pdf-orient" value="landscape"><span>橫向</span></label>
                </div>
            </div>

            <div class="pdf-field">
                <label>邊距 (mm)</label>
                <div class="pdf-radio-group">
                    <label><input type="radio" name="pdf-margin" value="8"><span>窄 (8)</span></label>
                    <label><input type="radio" name="pdf-margin" value="15" checked><span>標準 (15)</span></label>
                    <label><input type="radio" name="pdf-margin" value="25"><span>寬 (25)</span></label>
                </div>
            </div>

            <div class="pdf-field">
                <label>紙張大小</label>
                <div class="pdf-radio-group">
                    <label><input type="radio" name="pdf-size" value="a4" checked><span>A4</span></label>
                    <label><input type="radio" name="pdf-size" value="letter"><span>Letter</span></label>
                    <label><input type="radio" name="pdf-size" value="a3"><span>A3</span></label>
                </div>
            </div>

            <button id="exportPdfBtn" class="mt-2 w-full flex items-center justify-center gap-2 bg-[#42b883] hover:bg-[#33a06f] text-white font-semibold py-2.5 rounded-lg transition-colors shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                匯出 PDF
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
